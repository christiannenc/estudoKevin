<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajudando o Kevin a estudar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* Card redefinido: container com link + lista de tentativas */
        .exercicio-card {
            display: block;
            background: rgba(255,255,255,0.03);
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .exercicio-card:hover { border-color: #475569; }

        .exercicio-card-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
            gap: 12px;
        }
        .exercicio-card-link:hover { background: rgba(255,255,255,0.02); }

        .exercicio-info { flex: 1; min-width: 0; }
        .exercicio-nome { display: block; font-size: 14px; font-weight: 600; color: #f8fafc; }
        .exercicio-assunto { display: block; font-size: 12px; color: #94a3b8; margin-top: 3px; }

        .card-badge-area { flex-shrink: 0; }

        /* Lista de tentativas dentro do card */
        .attempt-list { border-top: 1px solid #334155; }
        .attempt-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            cursor: pointer;
            border-bottom: 1px solid #1e293b;
            transition: background 0.1s;
        }
        .attempt-row:last-child { border-bottom: none; }
        .attempt-row:hover { background: rgba(56,189,248,0.06); }
        .attempt-score {
            font-size: 12px;
            font-weight: 700;
            color: #4ade80;
            min-width: 90px;
        }
        .attempt-date {
            font-size: 12px;
            color: #94a3b8;
            flex: 1;
        }
        .attempt-arrow { font-size: 12px; color: #475569; }
        .attempt-delete {
            background: none;
            border: none;
            cursor: pointer;
            color: #475569;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1;
        }
        .attempt-delete:hover { color: #dc2626; background: rgba(220,38,38,0.1); }

        .not-done-row {
            padding: 8px 16px;
            font-size: 12px;
            color: #475569;
            border-top: 1px solid #334155;
            font-style: italic;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1e293b;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 640px;
            margin: auto;
            border: 1px solid #334155;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .modal-title { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }
        .modal-close:hover { color: #f8fafc; }
        .modal-subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-subtitle strong { color: #4ade80; }
        .wrong-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .wrong-item-q { font-size: 13px; color: #f8fafc; margin-bottom: 8px; line-height: 1.5; }
        .wrong-item-chosen {
            font-size: 12px; color: #f87171;
            background: rgba(220,38,38,0.08);
            border-left: 3px solid #dc2626;
            padding: 6px 10px; border-radius: 4px; margin-top: 6px;
        }
        .wrong-item-chosen span { font-weight: 700; }
        .wrong-item-answer {
            font-size: 12px; color: #4ade80;
            background: rgba(22,163,74,0.1);
            border-left: 3px solid #16a34a;
            padding: 6px 10px; border-radius: 4px; margin-top: 6px;
        }
        .wrong-item-answer span { font-weight: 700; }
        .modal-empty { text-align: center; color: #4ade80; font-size: 15px; padding: 20px 0; }
        .btn-delete-modal {
            background: none;
            border: 1px solid #334155;
            color: #94a3b8;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-delete-modal:hover { color: #dc2626; border-color: #dc2626; }
    </style>
</head>
<body>

<div class="page">
    <div class="header-row">
        <img src="assets/mascote.svg" alt="Mascote" class="mascot">
        <div>
            <h1>Ajudando o Kevin a estudar</h1>
            <p class="subtitle">Material de estudo organizado por matéria</p>
        </div>
    </div>

    <div id="materias-container"></div>
</div>

<!-- Modal de revisão de uma tentativa -->
<div class="modal-overlay" id="review-modal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">Revisão</span>
            <button class="modal-close" onclick="document.getElementById('review-modal').classList.remove('open')">✕</button>
        </div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const STORAGE_PREFIX = 'estudoKevin:scores:';
    const DELETE_PASSWORD = 'deletar'; // trocar aqui se quiser mudar a senha

    function getScores(arquivo) {
        try { return JSON.parse(localStorage.getItem(STORAGE_PREFIX + arquivo) || '[]'); }
        catch { return []; }
    }

    function saveScores(arquivo, scores) {
        try { localStorage.setItem(STORAGE_PREFIX + arquivo, JSON.stringify(scores)); }
        catch {}
    }

    function fmtDatetime(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function parseFilename(path) {
        const filename = path.split('/').pop();
        const match = filename.match(/^([a-z]+)_([a-z]+)_(\d{4})_tri(\d)_.+_(parcial|completa)_v(\d+)\.(html|pdf)$/i);
        if (!match) return { titulo: filename, extensao: filename.split('.').pop(), versao: 1, ano: 0, tri: 0 };
        const [, , , ano, tri, completude, versao, extensao] = match;
        const completudeLabel = completude.charAt(0).toUpperCase() + completude.slice(1);
        return {
            titulo: `${tri}º trimestre ${ano} · ${completudeLabel} · v${versao}`,
            extensao: extensao.toLowerCase(),
            versao: parseInt(versao, 10),
            ano: parseInt(ano, 10),
            tri: parseInt(tri, 10)
        };
    }

    function sortKey(exercicio) {
        const scores = getScores(exercicio.arquivo);
        const info = parseFilename(exercicio.arquivo);
        const done = scores.length > 0 ? 1 : 0;
        return [done, -info.ano, -info.tri, -info.versao];
    }

    function compareSortKeys(a, b) {
        const ka = sortKey(a), kb = sortKey(b);
        for (let i = 0; i < ka.length; i++) {
            if (ka[i] !== kb[i]) return ka[i] < kb[i] ? -1 : 1;
        }
        return 0;
    }

    function toggleMateria(headerEl) {
        headerEl.closest('.materia-section').classList.toggle('open');
    }

    let _modalArquivo = null;
    let _modalIndex = null;

    function openReview(arquivo, titulo, index) {
        _modalArquivo = arquivo;
        _modalIndex = index;
        const scores = getScores(arquivo);
        const entry = scores[index];
        const pct = Math.round((entry.score / entry.total) * 100);

        document.getElementById('modal-title').textContent = titulo;
        document.getElementById('modal-subtitle').innerHTML =
            `<span>${fmtDatetime(entry.date)} · <strong>${entry.score}/${entry.total} (${pct}%)</strong></span>
             <button class="btn-delete-modal" onclick="deleteRun()">🗑 Excluir tentativa</button>`;

        const wrong = entry.wrong || [];
        document.getElementById('modal-body').innerHTML = wrong.length === 0
            ? '<div class="modal-empty">🎉 Nenhum erro nesta tentativa!</div>'
            : wrong.map(w => `
                <div class="wrong-item">
                    <div class="wrong-item-q">${w.text}</div>
                    ${w.chosen ? `<div class="wrong-item-chosen"><span>Você respondeu:</span> ${w.chosen}</div>` : ''}
                    <div class="wrong-item-answer"><span>Resposta correta:</span> ${w.correct}</div>
                </div>`).join('');

        document.getElementById('review-modal').classList.add('open');
    }

    function deleteRun() {
        const senha = prompt('Digite a senha para excluir:');
        if (senha !== DELETE_PASSWORD) {
            if (senha !== null) alert('Senha incorreta.');
            return;
        }
        const scores = getScores(_modalArquivo);
        scores.splice(_modalIndex, 1);
        saveScores(_modalArquivo, scores);
        document.getElementById('review-modal').classList.remove('open');
        location.reload();
    }

    function closeModal(e) {
        if (e.target === document.getElementById('review-modal')) {
            document.getElementById('review-modal').classList.remove('open');
        }
    }

    function renderExercicio(exercicio) {
        const info = parseFilename(exercicio.arquivo);
        const isQuiz = info.extensao === 'html';
        const badgeClass = isQuiz ? 'badge-quiz' : 'badge-imprimir';
        const badgeLabel = isQuiz ? 'Quiz' : 'Imprimir';
        const target = isQuiz ? ' target="_blank" rel="noopener"' : '';
        const scores = isQuiz ? getScores(exercicio.arquivo) : [];

        const attemptsHtml = isQuiz
            ? (scores.length === 0
                ? `<div class="not-done-row">Ainda não feito</div>`
                : `<div class="attempt-list">${[...scores].reverse().map((s, i) => {
                    const realIndex = scores.length - 1 - i;
                    const pct = Math.round((s.score / s.total) * 100);
                    return `<div class="attempt-row" onclick="openReview('${exercicio.arquivo}','${info.titulo}',${realIndex})">
                        <span class="attempt-score">✓ ${s.score}/${s.total} (${pct}%)</span>
                        <span class="attempt-date">${fmtDatetime(s.date)}</span>
                        <span class="attempt-arrow">→</span>
                    </div>`;
                }).join('')}</div>`)
            : '';

        return `
            <div class="exercicio-card">
                <a href="${exercicio.arquivo}"${target} class="exercicio-card-link">
                    <div class="exercicio-info">
                        <span class="exercicio-nome">${info.titulo}</span>
                        <span class="exercicio-assunto">${exercicio.assunto}</span>
                    </div>
                    <div class="card-badge-area">
                        <span class="badge ${badgeClass}">${badgeLabel}</span>
                    </div>
                </a>
                ${attemptsHtml}
            </div>
        `;
    }

    function renderMateria(key, materia) {
        const sorted = [...materia.exercicios].sort(compareSortKeys);
        const exerciciosHtml = sorted.length
            ? sorted.map(renderExercicio).join('')
            : '<p class="empty-msg">Nenhum exercício ainda.</p>';
        return `
            <div class="materia-section" id="materia-${key}">
                <button class="materia-header" onclick="toggleMateria(this)">
                    <span class="materia-header-left">
                        <i class="ti ti-${materia.icone}"></i>
                        ${materia.nome}
                        <span class="materia-count">(${materia.exercicios.length})</span>
                    </span>
                    <span class="chevron">▾</span>
                </button>
                <div class="materia-body">
                    <div class="materia-body-inner">
                        ${exerciciosHtml}
                    </div>
                </div>
            </div>
        `;
    }

    fetch('manifest.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('materias-container');
            container.innerHTML = Object.entries(data)
                .map(([key, materia]) => renderMateria(key, materia))
                .join('');
        })
        .catch(err => {
            document.getElementById('materias-container').innerHTML =
                '<p class="empty-msg">Não foi possível carregar o manifest.json</p>';
            console.error(err);
        });
</script>

</body>
</html>
